<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Store the current path and redirect to index.html
      sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/Eli-POC-Build/'">
  </head>
  <body>
    <!-- GitHub Pages will display this 404 page when a route is directly accessed.
         The script above saves the URL and redirects to index.html, 
         where the saved URL will be restored by the router. -->
  </body>
</html>
